name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract ZIP
        run: unzip FloatingMouse_Fixed.zip

      - name: Setup Gradle files
        run: |
          cd FloatingMouse

          cat > build.gradle << 'GRADLE'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
GRADLE

          cat > app/build.gradle << 'GRADLE'
apply plugin: 'com.android.application'
android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.example.floatingmouse"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
GRADLE

          cat > settings.gradle << 'GRADLE'
rootProject.name = "FloatingMouse"
include ':app'
GRADLE

          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.1-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
GRADLE

          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FloatingMouse-debug
          path: FloatingMouse/app/build/outputs/apk/debug/app-debug.apk
