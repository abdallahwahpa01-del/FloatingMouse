name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug \
          --no-daemon \
          --parallel \
          --build-cache \
          -x lint \
          -x test

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FloatingMouse-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
