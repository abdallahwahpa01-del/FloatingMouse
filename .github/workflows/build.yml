name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build APK using Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        arguments: assembleDebug --stacktrace --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FloatingMouse-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Build Logs on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: build/
        retention-days: 5
